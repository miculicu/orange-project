[env]
name = "path_graph_7"
graph_type = "path"
num_nodes = 7
beta = 0.1
probe_miss_probability = 0.2
attacker_cost = 0.05
defender_cost = 0.5
max_steps = 50
max_attack_nodes = 2
max_defend_nodes = 2
initial_compromised_probability = 0.0

[training]
algorithm = "ppo"
total_timesteps = 10000
seed = 7
device = "cpu"
verbose = 1
model_name = "ppo_defender"
output_root = "outputs"
learning_rate = 0.0003
n_steps = 2048
batch_size = 64
gamma = 0.99
