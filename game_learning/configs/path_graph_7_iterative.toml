[env]
name = "path_graph_7_iterative"
env_id = "basic_cyber_graph_defense"
graph_type = "path"
num_nodes = 4
beta = 0.1
probe_miss_probability = 0.1
attacker_cost = 0.05
defender_cost = 0.1
max_steps = 50
max_attack_nodes = 2
max_defend_nodes = 2
allow_full_attack = true
allow_full_defense = true
initial_compromised_probability = 0.0

[training]
algorithm = "ppo"
total_timesteps = 10000
seed = 7
device = "cpu"
verbose = 1
model_name = "ppo_defender"
output_root = "outputs"
learning_rate = 0.0003
n_steps = 2048
batch_size = 64
gamma = 0.99

[iterative]
iterations = 5
defender_timesteps = 20000
attacker_timesteps = 20000
